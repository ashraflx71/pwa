<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Creative 2026 | VideoGen</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --accent-blue: #007bff; --bg-dark: #050505; }
        body { background: var(--bg-dark); color: white; font-family: 'Cairo', sans-serif; text-align: center; padding: 20px; }
        .card { background: #111; border: 1px solid #222; border-radius: 20px; padding: 25px; max-width: 450px; margin: auto; box-shadow: 0 10px 30px rgba(0, 123, 255, 0.1); }
        input { width: 85%; padding: 15px; border-radius: 12px; border: 1px solid var(--accent-blue); background: #000; color: #fff; margin: 15px 0; outline: none; text-align: center; }
        .btn-royal { background: var(--accent-blue); color: white; border: none; padding: 18px; border-radius: 50px; font-weight: bold; width: 100%; cursor: pointer; }
        #progress-container { width: 100%; height: 6px; background: #222; margin-top: 15px; display: none; border-radius: 5px; overflow: hidden; }
        #progress-fill { width: 0%; height: 100%; background: var(--accent-blue); transition: 0.3s; }
        video { width: 100%; margin-top: 20px; border-radius: 15px; display: none; border: 2px solid var(--accent-blue); }
        canvas { display: none; }
    </style>
</head>
<body>

<div class="card">
    <h1 style="color: var(--accent-blue);">Creative 2026</h1>
    <p style="color:#888;">أتمتة الفيديو السحابي (أشرف)</p>
    
    <input type="text" id="videoText" placeholder="اكتب نص الفيديو هنا...">
    
    <div id="status-text" style="font-size: 14px; color: #0f0; margin-bottom: 5px;">جاهز لبدء الإنتاج...</div>
    <div id="progress-container"><div id="progress-fill"></div></div>

    <button id="genBtn" class="btn-royal" onclick="startRender()">🚀 إنتاج الفيديو سحابياً</button>
    
    <video id="videoResult" controls></video>
</div>

<canvas id="renderCanvas" width="640" height="360"></canvas>

<script>
async function startRender() {
    const text = document.getElementById('videoText').value;
    const canvas = document.getElementById('renderCanvas');
    const ctx = canvas.getContext('2d');
    const video = document.getElementById('videoResult');
    const btn = document.getElementById('genBtn');
    const bar = document.getElementById('progress-fill');
    const container = document.getElementById('progress-container');
    const status = document.getElementById('status-text');

    if (!text) return alert("ادخل النص يا كوماندر!");

    btn.disabled = true;
    container.style.display = 'block';
    status.innerText = ">> جاري الرندر السحابي...";

    const stream = canvas.captureStream(30);
    const recorder = new MediaRecorder(stream, { mimeType: 'video/webm' });
    const chunks = [];

    recorder.ondataavailable = e => chunks.push(e.data);
    recorder.onstop = () => {
        const blob = new Blob(chunks, { type: 'video/mp4' });
        video.src = URL.createObjectURL(blob);
        video.style.display = "block";
        status.innerText = "✅ تم الإنتاج بنجاح!";
        bar.style.width = "100%";
        btn.disabled = false;
    };

    recorder.start();
    let frame = 0;
    function draw() {
        ctx.fillStyle = "#050505"; ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.strokeStyle = "#007bff"; ctx.lineWidth = 10; ctx.strokeRect(10, 10, canvas.width-20, canvas.height-20);
        ctx.fillStyle = "#fff"; ctx.font = "bold 35px Cairo"; ctx.textAlign = "center";
        ctx.fillText(text, canvas.width/2, canvas.height/2);
        if (frame < 120) { frame++; bar.style.width = (frame/1.2) + "%"; requestAnimationFrame(draw); } 
        else { recorder.stop(); }
    }
    draw();
}
</script>
</body>
</html>
