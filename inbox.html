<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>أشرف المطور | Creative 2026</title>
    
    <style>
        :root {
            --black-royal: #000000;
            --blue-royal: #007bff;
            --text-gray: #b0b0b0;
        }

        body {
            background-color: var(--black-royal);
            color: white;
            font-family: 'Segoe UI', Arial, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            border-top: 5px solid var(--blue-royal);
        }

        .container {
            width: 90%;
            max-width: 500px;
            padding-top: 50px;
            text-align: center;
        }

        .card {
            background: #111;
            border: 1px solid #222;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 123, 255, 0.1);
        }

        h1 { color: var(--blue-royal); font-size: 32px; margin-bottom: 10px; }
        p { color: var(--text-gray); font-size: 18px; line-height: 1.6; }

        .btn-action {
            background: var(--blue-royal);
            color: white;
            border: none;
            padding: 15px 40px;
            border-radius: 50px;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            margin-top: 20px;
            width: 100%;
            transition: 0.3s;
        }

        .btn-action:active { transform: scale(0.98); }

        #install-prompt {
            display: none;
            background: #1a1a1a;
            padding: 15px;
            border-radius: 10px;
            margin-top: 20px;
            border: 1px dashed var(--blue-royal);
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="card">
            <h1>Creative 2026</h1>
            <p>منصة أشرف المطور للحلول التقنية والـ SEO</p>
            <hr style="border: 0.5px solid #222; margin: 20px 0;">
            <p>أهلاً بك في تطبيق الجيل القادم. تم تحسين هذا الموقع ليعمل بكفاءة الطاقة القصوى (Green Software).</p>
            
            <button class="btn-action">اكتشف الخدمات</button>

            <div id="install-prompt">
                <p style="font-size: 14px;">ثبّت التطبيق الآن على شاشة هاتفك</p>
                <button id="install-button" class="btn-action" style="padding: 10px; font-size: 16px;">تثبيت الآن</button>
            </div>
        </div>
    </div>

    <script>
        // كود تحويل الموقع إلى تطبيق (PWA Logic)
        let deferredPrompt;
        const installDiv = document.getElementById('install-prompt');
        const installBtn = document.getElementById('install-button');

        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            installDiv.style.display = 'block';
        });

        installBtn.addEventListener('click', async () => {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                const { outcome } = await deferredPrompt.userChoice;
                if (outcome === 'accepted') {
                    installDiv.style.display = 'none';
                }
                deferredPrompt = null;
            }
        });

        // تسجيل المحرك الخفي (Service Worker)
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('./sw.js');
        }
    </script>
</body>
</html>
